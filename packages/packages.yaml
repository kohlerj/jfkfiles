# Package map — single source of truth across hosts.
#
# Why: keep the HOST minimal and identical in spirit across macOS and a future
# immutable Linux host (Bluefin/Silverblue). The authoritative install list for
# macOS is ../home/Brewfile (consumed by `brew bundle`). This file documents the
# cross-OS mapping so porting to Linux is mechanical, not archaeological.
#
# Principle: anything that CAN be portable lives in a devcontainer, not the host.
# The host only carries: GUI apps, the shell, and a container runtime.

# ---------------------------------------------------------------------------
# HOST · GUI apps (cannot be containerized)
# ---------------------------------------------------------------------------
gui:
  kicad:        { brew_cask: kicad,      flatpak: org.kicad.KiCad }
  freecad:      { brew_cask: freecad,    flatpak: org.freecad.FreeCAD }
  openscad:     { brew_cask: openscad,   flatpak: org.openscad.OpenSCAD }
  # Not installed via brew here but called out in the brief:
  orcaslicer:   { brew_cask: orcaslicer, flatpak: io.github.softfever.OrcaSlicer }
  fusion360:    { note: "Autodesk installer only; macOS/Windows. No Linux build." }

# ---------------------------------------------------------------------------
# HOST · shell + base CLI (thin; most CLI dev tooling belongs in containers)
# ---------------------------------------------------------------------------
host_cli:
  zsh:          { brew: null(system), dnf: zsh,        note: "default shell" }
  starship:     { brew: starship,     dnf: starship }
  eza:          { brew: eza,          dnf: eza }
  bat:          { brew: bat,          dnf: bat }
  fd:           { brew: fd,           dnf: fd-find }
  fzf:          { brew: fzf,          dnf: fzf }
  zoxide:       { brew: zoxide,       dnf: zoxide }
  gh:           { brew: gh,           dnf: gh }
  neovim:       { brew: neovim,       dnf: neovim }
  tmux:         { brew: tmux,         dnf: tmux }
  chezmoi:      { brew: chezmoi,      install: "sh -c \"$(curl -fsLS get.chezmoi.io)\"" }

# ---------------------------------------------------------------------------
# HOST · container runtime (enables the dev layer)
# ---------------------------------------------------------------------------
container_runtime:
  podman:       { brew: podman,       dnf: podman,   note: "rootless; immutable-friendly" }
  devpod:       { brew_cask: devpod,  install: "https://devpod.sh" }

# ---------------------------------------------------------------------------
# DEV LAYER · belongs in devcontainers, NOT the host
#   embedded toolchain, language runtimes, build tools
# ---------------------------------------------------------------------------
containerize:
  - gcc-arm-embedded     # arm-none-eabi-gcc
  - cmake / ninja
  - openocd / picotool / dfu-util / minicom
  - pico-sdk
  - platformio
  - python (uv/pyenv)
  - node
  - llvm / clang-format
